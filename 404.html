<!DOCTYPE html>
<html lang="en">
<head>
<script defer src="/assets/js/analytics.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found ,  Aetas in the Workplace</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0d2c6c" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..700&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0d2c6c; --navy-dark: #081f4d;
  --gold: #b8934a; --gold-light: #d4b97a;
  --cream: #f8f4ee; --white: #ffffff;
  --muted: #5c5c5c; --border: rgba(184,154,90,0.22);
}
html, body { height: 100%; }
body {
  font-family: 'Open Sans', sans-serif; font-weight: 300;
  background: var(--navy); color: var(--white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 24px;
  text-align: center; overflow: hidden;
  position: relative;
}
body::before {
  content: ''; position: absolute; top: -120px; right: -120px;
  width: 600px; height: 600px; border-radius: 50%;
  border: 1px solid rgba(184,154,90,0.08); pointer-events: none;
}
body::after {
  content: ''; position: absolute; bottom: -160px; left: -100px;
  width: 460px; height: 460px; border-radius: 50%;
  border: 1px solid rgba(184,154,90,0.05); pointer-events: none;
}
.inner { position: relative; z-index: 1; max-width: 520px; }
.label {
  display: block; font-size: 0.68rem; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 20px;
}
.num {
  font-family: 'Open Sans', sans-serif;
  font-size: clamp(6rem, 18vw, 10rem);
  font-weight: 300; color: rgba(255,255,255,0.08);
  line-height: 1; margin-bottom: -20px;
  position: relative; z-index: 0;
}
h1 {
  font-family: 'Open Sans', sans-serif;
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 400; color: var(--white);
  line-height: 1.2; margin-bottom: 20px;
  position: relative; z-index: 1;
}
h1 em { font-style: italic; color: var(--gold-light); }
.rule { width: 44px; height: 1px; background: var(--gold); margin: 0 auto 24px; }
p { color: rgba(255,255,255,0.5); font-size: 0.95rem; line-height: 1.75; margin-bottom: 36px; }
.links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.btn {
  display: inline-block; font-family: 'Open Sans', sans-serif;
  font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; text-decoration: none;
  padding: 12px 26px; border: 1px solid transparent;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.btn-primary { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); }
.btn-ghost { background: transparent; color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }
.btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }
.brand {
  position: absolute; top: 28px; left: 40px;
  font-family: 'Open Sans', sans-serif;
  font-size: 0.95rem; font-weight: 500;
  color: rgba(255,255,255,0.5); text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.3s;
}
.brand:hover { color: var(--gold-light); }
@media (max-width: 600px) { .brand { left: 24px; } }

  /* brand-refresh: inline logo marks */
  .nav-mark    { width: 32px; height: 32px; vertical-align: middle; margin-right: 10px; }
  .nav-brand .nav-mark { width: 28px; height: 28px; margin-right: 8px; }
  .footer-mark { width: 28px; height: 28px; vertical-align: middle; margin-right: 10px; }
  .footer-brand .footer-mark { width: 26px; height: 26px; margin-right: 8px; }

  /* type-refresh: wealth-style nav lockup */
  /* Mark sits as a flex child of the anchor; tagline stacked beneath brand. */
  .nav-logo  { display: inline-flex; align-items: center; gap: 12px; }
  .nav-brand { display: inline-flex; align-items: center; gap: 10px; }
  .nav-logo .nav-mark, .nav-brand .nav-mark {
    margin-right: 0; vertical-align: middle; flex-shrink: 0; display: block;
  }
  .nav-lockup { display: flex; flex-direction: column; line-height: 1.05; }
  .nav-logo .nav-brand-text, .nav-brand .nav-brand-text {
    font-family: 'Open Sans', sans-serif;
    font-weight: 700;
    font-size: 1.0rem;
    letter-spacing: 0;
    color: var(--navy);
  }
  .nav-brand .nav-brand-text { color: var(--white); }
  .nav-logo .nav-tagline, .nav-brand .nav-tagline {
    font-family: 'Open Sans', sans-serif;
    font-weight: 600;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #00aabb;
    margin-top: 3px;
  }
  /* Soften nav links to mixed-case to match the Wealth nav. */
  .nav-links a, nav .nav-links a {
    text-transform: none !important;
    letter-spacing: 0 !important;
    font-size: 0.88rem !important;
  }
  .nav-links .nav-cta, nav .nav-links .nav-cta {
    font-size: 0.82rem !important;
    letter-spacing: 0.02em !important;
  }

/* ---- Nav dropdown ---- */
.nav-dropdown { position: relative; }
.nav-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 0.5rem);
  left: 0;
  background: var(--aetas-blue);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius);
  min-width: 220px;
  padding: 0.5rem 0;
  list-style: none;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.nav-dropdown-menu li a {
  display: block;
  padding: 0.6rem 1.25rem;
  color: rgba(255,255,255,0.85);
  font-size: 0.9rem;
  text-decoration: none;
  transition: color 0.15s, background 0.15s;
}
.nav-dropdown-menu li a:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown-menu:hover { display: block; }
.nav-caret { font-size: 0.6rem; margin-left: 0.3rem; vertical-align: middle; }
@media (max-width: 768px) {
  .nav-dropdown-menu { position: static; box-shadow: none; border: none; background: transparent; padding: 0 0 0 1rem; }
  .nav-dropdown-menu li a { color: rgba(255,255,255,0.7); padding: 0.4rem 0; }
  .nav-dropdown:hover .nav-dropdown-menu { display: none; }
  .nav-dropdown.is-open .nav-dropdown-menu { display: block; }
}

</style>
</head>
<body>

<a class="brand" href="/">Aetas in the Workplace</a>

<div class="inner">
  <span class="label">404 ,  Page not found</span>
  <div class="num">404</div>
  <h1>This page doesn't exist.<br><em>But the right one probably does.</em></h1>
  <div class="rule"></div>
  <p>The page you were looking for has moved, or the link may have been mistyped. Try one of the pages below, or book a conversation directly.</p>
  <div class="links">
    <a class="btn btn-primary" href="https://aetas-wealth.com/book" rel="noopener noreferrer">Book a Review</a>
    <a class="btn btn-ghost" href="/">Go to homepage</a>
    <a class="btn btn-ghost" href="/limited-companies">Limited companies</a>
    <a class="btn btn-ghost" href="/llps">LLPs</a>
  </div>
</div>


<script>
(function(){
  var burger = document.getElementById('navBurger');
  var links  = document.querySelector('.nav-links');
  if (!burger || !links) return;
  burger.addEventListener('click', function(){
    var open = links.classList.toggle('open');
    burger.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open);
    document.body.style.overflow = open ? 'hidden' : '';
  });
  document.addEventListener('click', function(e){
    if (!burger.contains(e.target) && !links.contains(e.target)){
      links.classList.remove('open');
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }
  });
})();
</script>
</body>
</html>
